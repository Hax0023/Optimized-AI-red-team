services:
  autopentest-tools:
    build: .
    container_name: autopentest-tools
    restart: unless-stopped
    tty: true
    stdin_open: true
    volumes:
      - ./engagements:/engagements
      - /etc/hosts:/etc/hosts:ro
    network_mode: host
    cap_add:
      - NET_RAW
      - NET_ADMIN
    environment:
      - TERM=xterm-256color
    command: tail -f /dev/null

  mcp-server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    container_name: autopentest-mcp
    restart: unless-stopped
    volumes:
      - ./engagements:/app/engagements
      - ./server:/app/server
      - ./config:/app/config
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ENGAGEMENT_DIR=/app/engagements
    ports:
      - "8000:8000"
